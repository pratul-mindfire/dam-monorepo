services:
  mongo:
    image: ${MONGO_IMAGE:-mongo:7}
    restart: unless-stopped
    ports:
      - '27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: ${RABBITMQ_IMAGE:-rabbitmq:4-management}
    restart: unless-stopped
    ports:
      - '5672:5672'
      - '${RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:${RABBITMQ_MANAGEMENT_CONTAINER_PORT:-15672}'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    restart: unless-stopped
    command: server ${MINIO_DATA_DIR:-/data} --console-address ":${MINIO_CONSOLE_CONTAINER_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-local-minio-user}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-local-minio-password}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_HOST_PORT:-9002}:${MINIO_CONSOLE_CONTAINER_PORT:-9001}'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - minio_data:${MINIO_DATA_DIR:-/data}

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PORT: ${PORT:-5000}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/dam}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-local-minio-user}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-local-minio-password}
      MINIO_BUCKET: ${MINIO_BUCKET:-assets}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-http://localhost/storage}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      RABBITMQ_ASSET_QUEUE: ${RABBITMQ_ASSET_QUEUE:-asset-processing}
      MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES:-1073741824}
      UPLOAD_TMP_DIR: ${UPLOAD_TMP_DIR:-/tmp/dam-uploads}
      JWT_SECRET: ${JWT_SECRET:-local-development-jwt-secret}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
    expose:
      - '${PORT:-5000}'

  nginx:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api/v1}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - '${NGINX_HOST_PORT:-80}:${NGINX_CONTAINER_PORT:-80}'

volumes:
  mongo_data:
  rabbitmq_data:
  minio_data:
